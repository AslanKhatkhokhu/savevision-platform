<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SaveVision — Operator Workspace</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#2a323d;--fg:#e6edf3;--dim:#8b949e;--accent:#00c98d;--accfg:#03110b;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  html,body{height:100%;background:var(--bg);color:var(--fg);overflow:hidden;}
  .bar{display:flex;align-items:center;gap:16px;height:50px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--panel);}
  .brand{font-weight:700;font-size:16px;white-space:nowrap;} .brand span{color:var(--accent);font-weight:500;}
  .tabs{display:flex;gap:6px;}
  .tabs button{background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;}
  .tabs button.on{background:var(--accent);color:var(--accfg);border-color:var(--accent);}
  .right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .right a{color:var(--dim);font-size:12px;text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
  .right a:hover{color:var(--fg);}
  .stagewrap{position:absolute;top:50px;left:0;right:0;bottom:0;}
  iframe{width:100%;height:100%;border:0;display:block;background:#0a0e13;}
</style>
</head>
<body>
  <div class="bar">
    <div class="brand">SaveVision · <span>Operator workspace</span></div>
    <div class="tabs" id="tabs">
      <button data-src="console.html" class="on">🗺 Operations console</button>
      <button data-src="medic.html">🩺 Medic — live call</button>
      <button data-src="map.html">📍 Situation map</button>
    </div>
    <div class="right">
      <a id="newtab" href="console.html" target="_blank">↗ Open this view in a new tab</a>
    </div>
  </div>
  <div class="stagewrap">
    <iframe id="stage" src="console.html" allow="camera;microphone;geolocation;display-capture"></iframe>
  </div>

<script>
  const stage = document.getElementById("stage");
  const newtab = document.getElementById("newtab");
  document.querySelectorAll("#tabs button").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll("#tabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    const src = b.dataset.src;
    stage.src = src;
    newtab.href = src;
  }));
</script>
</body>
</html>
