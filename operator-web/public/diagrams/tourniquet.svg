<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <rect width="240" height="160" fill="#06120d"/>
  <text x="120" y="20" fill="#00ff95" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">TOURNIQUET</text>
  <!-- limb -->
  <rect x="20" y="78" width="200" height="34" rx="17" fill="#13231c" stroke="#2f4438"/>
  <!-- wound -->
  <circle cx="180" cy="95" r="7" fill="#7a1f1f"/>
  <!-- band high & tight -->
  <rect x="78" y="70" width="22" height="50" rx="5" fill="none" stroke="#00e0ff" stroke-width="4"/>
  <!-- windlass -->
  <line x1="89" y1="70" x2="89" y2="44" stroke="#00e0ff" stroke-width="4"/>
  <circle cx="89" cy="42" r="6" fill="none" stroke="#00e0ff" stroke-width="4"/>
  <text x="120" y="140" fill="#cfe" font-family="sans-serif" font-size="11" text-anchor="middle">High &amp; tight · 5–8 cm above wound</text>
  <text x="120" y="154" fill="#9bb" font-family="sans-serif" font-size="10" text-anchor="middle">twist to stop bleeding · note the time · don't loosen</text>
</svg>
