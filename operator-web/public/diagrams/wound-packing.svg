<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <rect width="240" height="160" fill="#06120d"/>
  <text x="120" y="20" fill="#00ff95" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">WOUND PACKING</text>
  <!-- wound cavity -->
  <path d="M70 120 Q90 70 120 72 Q150 70 170 120 Z" fill="#23120f" stroke="#2f4438"/>
  <!-- gauze being packed -->
  <path d="M120 30 C100 60 140 70 120 95" fill="none" stroke="#00e0ff" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 95 l-9 -6 m9 6 l7 -8" fill="none" stroke="#00e0ff" stroke-width="5" stroke-linecap="round"/>
  <text x="120" y="142" fill="#cfe" font-family="sans-serif" font-size="11" text-anchor="middle">Pack gauze deep, onto the bleeding point</text>
  <text x="120" y="155" fill="#9bb" font-family="sans-serif" font-size="10" text-anchor="middle">then hold firm pressure ≥ 3 min</text>
</svg>
