<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Glasses view (realistic)</title>
<style>
  :root{--hud:#00ff95;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0f0d;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  .glasses{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden;}
  .pov{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 42%;}
  .ann{position:absolute;inset:0;}
  .banner{position:absolute;top:0;left:0;right:0;padding:18px 22px;background:linear-gradient(#000d,#0000);color:var(--hud);font-size:26px;font-weight:800;text-shadow:0 1px 4px #000;}
  .rec{position:absolute;top:16px;right:18px;color:#ff7a7a;font-size:14px;font-weight:700;text-shadow:0 1px 3px #000;}
  .compass{position:absolute;left:18px;bottom:24px;width:104px;height:104px;}
  .compass .ring{position:absolute;inset:0;border:2px solid #ffffff55;border-radius:50%;}
  .compass .arrow{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;color:var(--hud);transform:rotate(34deg);}
  .compass .lbl{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:13px;color:var(--hud);}
  .pill{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:#000b;border:1px solid var(--hud);color:var(--hud);font-size:14px;padding:6px 14px;border-radius:999px;}
</style></head><body>
  <div class="glasses">
    <img class="pov" src="assets/herz-lungen-wieder.jpg" alt="POV">
    <svg class="ann" viewBox="0 0 100 100" preserveAspectRatio="none">
      <ellipse cx="49" cy="55" rx="9" ry="11" fill="none" stroke="#00ff95" stroke-width="0.9"/>
      <path d="M26 30 Q40 42 45 50" fill="none" stroke="#00e0ff" stroke-width="0.9" stroke-linecap="round"/>
      <path d="M45 50 l-4.5 -1 m4.5 1 l-1 -4.6" fill="none" stroke="#00e0ff" stroke-width="0.9" stroke-linecap="round"/>
    </svg>
    <div class="banner">Compress centre of chest — 100–120/min</div>
    <div class="rec">● REC · LIVE</div>
    <div class="compass"><div class="ring"></div><div class="arrow">↑</div><div class="lbl">Collection point · 40 m</div></div>
    <div class="pill">index-pinch · acknowledge</div>
  </div>
</body></html>
